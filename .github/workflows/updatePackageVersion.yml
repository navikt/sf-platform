name: Update Package Version

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: "Version number"
        required: true
        default: ""
      package_name:
        description: "Name of the package to update"
        required: true
        default: ""

jobs:
  update_version:
    runs-on: ubuntu-latest
    env:
      VERSION_NUMBER: ${{ github.event.inputs.version_number }}
      PACKAGE_NAME: ${{ github.event.inputs.package_name }}
      REF_NAME: ${{ github.ref_name }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git for signing
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Update version in sfdx-project.json
        run: |
          # Read the current sfdx-project.json
          input_file="sfdx-project.json"

          # Validate inputs
          if [ -z "$PACKAGE_NAME" ] || [ -z "$VERSION_NUMBER" ]; then
            echo "::error::package_name and version_number inputs are required"
            exit 1
          fi

          # Update versionNumber for the specified package
          jq --arg pkg "$PACKAGE_NAME" --arg ver "$VERSION_NUMBER" \
            '(.packageDirectories[] | select(.package == $pkg) | .versionNumber) |= $ver | 
             (.packageDirectories[].dependencies?[]? | select(.package == $pkg) | .versionNumber) |= $ver' \
            "$input_file" > tmp.json && mv tmp.json "$input_file"

      # Create a signed commit
      - name: Create signed commit
        run: |
          git add sfdx-project.json
          git commit -m "Update package version to $VERSION_NUMBER for $PACKAGE_NAME"
          git push origin $REF_NAME

      - name: Debug commit signature
        if: failure() # Run only if previous steps fail
        run: |
          git log --show-signature -1
          echo "Git config:"
          git config --global --list
